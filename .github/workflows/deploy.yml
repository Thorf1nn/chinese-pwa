name: Deploy PWA to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download Tatoeba data
        run: |
          mkdir -p scripts
          curl -sL -o scripts/cmn_sentences.tsv.bz2 https://downloads.tatoeba.org/exports/per_language/cmn/cmn_sentences.tsv.bz2
          curl -sL -o scripts/fra_sentences.tsv.bz2 https://downloads.tatoeba.org/exports/per_language/fra/fra_sentences.tsv.bz2
          curl -sL -o scripts/cmn-fra_links.tsv.bz2 https://downloads.tatoeba.org/exports/per_language/cmn/cmn-fra_links.tsv.bz2
          bunzip2 scripts/cmn_sentences.tsv.bz2 scripts/fra_sentences.tsv.bz2 scripts/cmn-fra_links.tsv.bz2

      - name: Build data files (CFDICT + HSK + sentences)
        run: npm run build:data

      - name: Generate PWA icons
        run: npx tsx scripts/gen-icons.ts

      - name: Build app
        run: npm run build

      - name: Copy 404.html for SPA routing
        run: cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
